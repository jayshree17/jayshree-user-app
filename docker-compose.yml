
services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: userapp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-userapp}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-userapp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ──
  api:
    build: ./api
    container_name: userapp-api
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-appuser}:${DB_PASSWORD:-localdev123}@db:5432/${POSTGRES_DB:-userapp}"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── Angular Frontend (build) ──
  frontend:
    build: ./frontend
    container_name: userapp-frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    build: ./nginx
    container_name: userapp-nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  frontend_dist:
